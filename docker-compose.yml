services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: living_worlds
      POSTGRES_USER: living_worlds
      POSTGRES_PASSWORD: living_worlds
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U living_worlds -d living_worlds"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
volumes:
  postgres-data:
  minio-data:
